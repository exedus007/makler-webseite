<script>
async function ladeObjekte() {
  const projectId = "lya1es34";
  const dataset = "production";

  const query = encodeURIComponent('*[_type=="immobilie"]');
  const url = `https://${projectId}.api.sanity.io/v2023-01-01/data/query/${dataset}?query=${query}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    const container = document.getElementById("objekte-container");
    container.innerHTML = '<div class="objekte-grid"></div>';
    const grid = container.querySelector(".objekte-grid");

    data.result
      .filter(obj => obj.status !== "verkauft")
      .forEach(obj => {
        const div = document.createElement("div");
        div.classList.add("objekt-card");

        let bildUrl = "";
        if (obj.bild && obj.bild.asset && obj.bild.asset._ref) {
          const ref = obj.bild.asset._ref;
          const parts = ref.split("-");
          const id = parts[1];
          const dimensions = parts[2];
          const format = parts[3];
          bildUrl = `https://cdn.sanity.io/images/${projectId}/${dataset}/${id}-${dimensions}.${format}`;
        }

        div.innerHTML = `
          ${bildUrl ? `<img class="objekt-bild" src="${bildUrl}" alt="${obj.titel}">` : ""}
          <div class="objekt-inhalt">
            <h3>${obj.titel || ""}</h3>
            <p><strong>Ort:</strong> ${obj.ort || ""}</p>
            <p><strong>Preis:</strong> ${obj.preis || ""}</p>
            <p><strong>Wohnfläche:</strong> ${obj.wohnflaeche || ""}</p>
            <p><strong>Zimmer:</strong> ${obj.zimmer || ""}</p>
            <p>${obj.beschreibung || ""}</p>
            <span class="status-badge">${obj.status || ""}</span>
          </div>
        `;

        grid.appendChild(div);
      });

    if (!data.result || data.result.filter(obj => obj.status !== "verkauft").length === 0) {
      container.innerHTML = "<p>Keine verfügbaren Objekte vorhanden.</p>";
    }
  } catch (error) {
    console.error("Fehler:", error);
    document.getElementById("objekte-container").innerHTML = "Fehler beim Laden";
  }
}

ladeObjekte();
</script>
