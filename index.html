<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deisterblick Immobilien</title>
  <meta name="description" content="Deisterblick Immobilien – Verwaltung, Makler und Finanzierung.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="topbar">
    <div class="container topbar-inner">
      <span>📞 0177 - 2929512</span>
      <a href="mailto:info@deisterblick-immobilien.de" class="topbar-link">✉️ info@deisterblick-immobilien.de</a>
    </div>
  </div>

  <nav class="navbar">
    <div class="container nav-container">
      <a href="#home" class="logo">
        <img src="assets/logo.jpg" alt="Logo">
      </a>

      <button class="menu-toggle" id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="nav-links" id="nav-links">
        <a href="#home">Start</a>
        <a href="#kontakt">Kontakt</a>
      </div>
    </div>
  </nav>

  <header class="hero" id="home">
    <div class="container hero-grid">
      <div>
        <h1>Ihr Immobilienpartner</h1>
        <a href="#kontakt" class="btn">Kontakt</a>
      </div>
    </div>
  </header>

  <section class="section" id="kontakt">
    <div class="container contact-grid">

      <div>
        <h2>Kontakt</h2>
      </div>

      <div class="form-box">
        <form class="contact-form" id="contact-form">

          <input type="text" name="name" placeholder="Ihr Name" required>
          <input type="email" name="email" placeholder="Ihre E-Mail" required>
          <textarea name="message" rows="6" placeholder="Ihre Nachricht" required></textarea>

          <!-- ✅ KORREKT -->
          <label class="checkbox-wrap">
            <input type="checkbox" name="privacy" required>
            <span>
              Ich habe die
              <a href="assets/datenschutzbestimmungen.pdf" target="_blank" rel="noopener noreferrer">
                Datenschutzbestimmungen
              </a>
              gelesen und bin damit einverstanden, dass meine Angaben zur Bearbeitung meiner Anfrage gespeichert und verarbeitet werden.
            </span>
          </label>

          <button type="submit" class="submit-btn">Anfrage senden</button>

        </form>
      </div>

    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>© Deisterblick Immobilien</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
