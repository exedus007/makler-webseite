<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Deisterblick Immobilien</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #0f4b3a;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 48px;
    }

    header p {
      margin: 0;
      font-size: 18px;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
    }

    .objekte-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .objekt-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .objekt-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.12);
    }

    .objekt-bild {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #ddd;
    }

    .objekt-inhalt {
      padding: 20px;
    }

    .objekt-card h3 {
      margin: 0 0 14px;
      color: #0f4b3a;
      font-size: 22px;
    }

    .objekt-card p {
      margin: 8px 0;
      font-size: 16px;
      color: #222;
    }

    .status-badge {
      display: inline-block;
      margin-top: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
    }

    .status-verfuegbar {
      background: #eef4f1;
      color: #0f4b3a;
    }

    .status-reserviert {
      background: #fff3cd;
      color: #8a6d00;
    }

    .leer-text {
      text-align: center;
      font-size: 18px;
      color: #555;
      padding: 40px 0;
    }

    /* POPUP */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .popup-overlay.active {
      display: flex;
    }

    .popup-box {
      position: relative;
      width: 100%;
      max-width: 860px;
      max-height: 90vh;
      overflow-y: auto;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
    }

    .popup-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      z-index: 10;
    }

    .popup-nav {
      position: absolute;
      top: 220px;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 50%;
      background: rgba(15, 75, 58, 0.95);
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    .popup-prev {
      left: 18px;
    }

    .popup-next {
      right: 18px;
    }

    .popup-header {
      width: 100%;
      height: 440px;
      background: #e8e8e8;
      overflow: hidden;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
    }

    .popup-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .popup-content {
      padding: 32px;
    }

    .popup-content h2 {
      margin: 0 0 18px;
      color: #0f4b3a;
      font-size: 34px;
      line-height: 1.2;
    }

    .popup-details {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px 24px;
      margin-bottom: 20px;
    }

    .popup-detail {
      background: #f7f7f7;
      border-radius: 14px;
      padding: 14px 16px;
    }

    .popup-detail strong {
      display: block;
      color: #0f4b3a;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .popup-detail span {
      font-size: 18px;
      color: #222;
    }

    .popup-beschreibung {
      margin-top: 16px;
      font-size: 17px;
      line-height: 1.7;
      color: #333;
    }

    .popup-status-row {
      margin-top: 24px;
      margin-bottom: 24px;
    }

    .popup-objekt-id {
      margin-top: 12px;
      font-size: 13px;
      color: #6d6d6d;
      word-break: break-all;
    }

    .popup-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 18px;
    }

    .popup-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
      transition: 0.2s ease;
    }

    .popup-btn-primary {
      background: #0f4b3a;
      color: #fff;
    }

    .popup-btn-primary:hover {
      background: #0c3b2d;
    }

    .popup-btn-secondary {
      background: #eef4f1;
      color: #0f4b3a;
      border: 1px solid #d8e5de;
    }

    .popup-btn-secondary:hover {
      background: #e3eee9;
    }

    .popup-btn-outline {
      background: #ffffff;
      color: #0f4b3a;
      border: 2px solid #0f4b3a;
    }

    .popup-btn-outline:hover {
      background: #f3f8f5;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 36px;
      }

      .popup-box {
        max-width: 100%;
      }

      .popup-header {
        height: 250px;
      }

      .popup-nav {
        top: 125px;
        width: 44px;
        height: 44px;
        font-size: 24px;
      }

      .popup-prev {
        left: 10px;
      }

      .popup-next {
        right: 10px;
      }

      .popup-content {
        padding: 22px;
      }

      .popup-content h2 {
        font-size: 28px;
      }

      .popup-details {
        grid-template-columns: 1fr;
      }

      .popup-buttons {
        flex-direction: column;
      }

      .popup-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Deisterblick Immobilien</h1>
    <p>Aktuelle Objekte</p>
  </header>

  <div class="container">
    <div id="objekte-container">
      <p class="leer-text">Lade Objekte...</p>
    </div>
  </div>

  <div id="popupOverlay" class="popup-overlay">
    <div class="popup-box">
      <button class="popup-close" id="popupClose">&times;</button>
      <button class="popup-nav popup-prev" id="popupPrev">&#10094;</button>
      <button class="popup-nav popup-next" id="popupNext">&#10095;</button>
      <div id="popupInner"></div>
    </div>
  </div>

  <script>
    const projectId = "lya1es34";
    const dataset = "production";
    const anfrageEmail = "info@deisterblick-immobilien.de";

    let objekteListe = [];
    let aktuellerIndex = 0;

    function bildUrlAusRef(ref) {
      if (!ref) return "";
      const parts = ref.split("-");
      const id = parts[1];
      const dimensions = parts[2];
      const format = parts[3];
      return `https://cdn.sanity.io/images/${projectId}/${dataset}/${id}-${dimensions}.${format}`;
    }

    function exposeUrlAusRef(ref) {
      if (!ref) return "";
      const parts = ref.split("-");
      const id = parts[1];
      const format = parts[2];
      return `https://cdn.sanity.io/files/${projectId}/${dataset}/${id}.${format}`;
    }

    function statusKlasse(status) {
      if (status === "reserviert") return "status-reserviert";
      return "status-verfuegbar";
    }

    function statusText(status) {
      if (status === "reserviert") return "Reserviert";
      if (status === "verkauft") return "Verkauft";
      return "Verfügbar";
    }

    function anfrageLinkFuerObjekt(obj) {
      const betreff = `Anfrage zu Objekt: ${obj.titel || "Immobilie"} | ID: ${obj._id || ""}`;
      const text = `Guten Tag,%0D%0A%0D%0Aich interessiere mich für folgendes Objekt:%0D%0A%0D%0ATitel: ${obj.titel || ""}%0D%0AOrt: ${obj.ort || ""}%0D%0APreis: ${obj.preis || ""}%0D%0AStatus: ${statusText(obj.status)}%0D%0AObjekt-ID: ${obj._id || ""}%0D%0A%0D%0ABitte kontaktieren Sie mich.%0D%0A%0D%0AVielen Dank.`;
      return `mailto:${anfrageEmail}?subject=${betreff}&body=${text}`;
    }

    function zeigePopup(index) {
      aktuellerIndex = index;
      const obj = objekteListe[index];
      const popupInner = document.getElementById("popupInner");
      const popupOverlay = document.getElementById("popupOverlay");

      let bildUrl = "";
      if (obj.bild && obj.bild.asset && obj.bild.asset._ref) {
        bildUrl = bildUrlAusRef(obj.bild.asset._ref);
      }

      let exposeUrl = "";
      if (obj.expose && obj.expose.asset && obj.expose.asset._ref) {
        exposeUrl = exposeUrlAusRef(obj.expose.asset._ref);
      }

      const anfrageLink = anfrageLinkFuerObjekt(obj);

      popupInner.innerHTML = `
        <div class="popup-header">
          ${bildUrl ? `<img class="popup-image" src="${bildUrl}" alt="${obj.titel || ""}">` : ""}
        </div>

        <div class="popup-content">
          <h2>${obj.titel || ""}</h2>

          <div class="popup-details">
            <div class="popup-detail">
              <strong>Ort</strong>
              <span>${obj.ort || ""}</span>
            </div>

            <div class="popup-detail">
              <strong>Preis</strong>
              <span>${obj.preis || ""}</span>
            </div>

            <div class="popup-detail">
              <strong>Wohnfläche</strong>
              <span>${obj.wohnflaeche || ""}</span>
            </div>

            <div class="popup-detail">
              <strong>Zimmer</strong>
              <span>${obj.zimmer || ""}</span>
            </div>
          </div>

          <div class="popup-beschreibung">
            ${obj.beschreibung || ""}
          </div>

          <div class="popup-status-row">
            <span class="status-badge ${statusKlasse(obj.status)}">${statusText(obj.status)}</span>
            <div class="popup-objekt-id">Objekt-ID: ${obj._id || ""}</div>
          </div>

          <div class="popup-buttons">
            <a class="popup-btn popup-btn-primary" href="${anfrageLink}">
              Anfrage senden
            </a>

            ${
              exposeUrl
                ? `
                <a class="popup-btn popup-btn-secondary" href="${exposeUrl}" target="_blank" rel="noopener noreferrer">
                  Exposé ansehen
                </a>
                <a class="popup-btn popup-btn-outline" href="${exposeUrl}" download>
                  Exposé herunterladen
                </a>
              `
                : ""
            }
          </div>
        </div>
      `;

      popupOverlay.classList.add("active");
    }

    function naechstesObjekt() {
      if (objekteListe.length === 0) return;
      aktuellerIndex = (aktuellerIndex + 1) % objekteListe.length;
      zeigePopup(aktuellerIndex);
    }

    function vorherigesObjekt() {
      if (objekteListe.length === 0) return;
      aktuellerIndex = (aktuellerIndex - 1 + objekteListe.length) % objekteListe.length;
      zeigePopup(aktuellerIndex);
    }

    function popupSchliessen() {
      document.getElementById("popupOverlay").classList.remove("active");
    }

    async function ladeObjekte() {
      const query = encodeURIComponent('*[_type=="immobilie"]');
      const url = `https://${projectId}.api.sanity.io/v2023-01-01/data/query/${dataset}?query=${query}`;

      const container = document.getElementById("objekte-container");

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (!container) return;

        objekteListe = (data.result || []).filter(obj => obj.status !== "verkauft");

        if (objekteListe.length === 0) {
          container.innerHTML = '<p class="leer-text">Keine verfügbaren oder reservierten Objekte vorhanden.</p>';
          return;
        }

        container.innerHTML = '<div class="objekte-grid"></div>';
        const grid = container.querySelector(".objekte-grid");

        objekteListe.forEach((obj, index) => {
          const div = document.createElement("div");
          div.classList.add("objekt-card");

          let bildUrl = "";
          if (obj.bild && obj.bild.asset && obj.bild.asset._ref) {
            bildUrl = bildUrlAusRef(obj.bild.asset._ref);
          }

          div.innerHTML = `
            ${bildUrl ? `<img class="objekt-bild" src="${bildUrl}" alt="${obj.titel || ""}">` : ""}
            <div class="objekt-inhalt">
              <h3>${obj.titel || ""}</h3>
              <p><strong>Ort:</strong> ${obj.ort || ""}</p>
              <p><strong>Preis:</strong> ${obj.preis || ""}</p>
              <p><strong>Wohnfläche:</strong> ${obj.wohnflaeche || ""}</p>
              <p><strong>Zimmer:</strong> ${obj.zimmer || ""}</p>
              <span class="status-badge ${statusKlasse(obj.status)}">${statusText(obj.status)}</span>
            </div>
          `;

          div.addEventListener("click", () => {
            zeigePopup(index);
          });

          grid.appendChild(div);
        });

      } catch (error) {
        console.error("Fehler:", error);
        if (container) {
          container.innerHTML = '<p class="leer-text">Fehler beim Laden</p>';
        }
      }
    }

    document.getElementById("popupClose").addEventListener("click", popupSchliessen);
    document.getElementById("popupNext").addEventListener("click", naechstesObjekt);
    document.getElementById("popupPrev").addEventListener("click", vorherigesObjekt);

    document.getElementById("popupOverlay").addEventListener("click", function(e) {
      if (e.target === this) {
        popupSchliessen();
      }
    });

    document.addEventListener("keydown", function(e) {
      const popupOffen = document.getElementById("popupOverlay").classList.contains("active");
      if (!popupOffen) return;

      if (e.key === "Escape") popupSchliessen();
      if (e.key === "ArrowRight") naechstesObjekt();
      if (e.key === "ArrowLeft") vorherigesObjekt();
    });

    ladeObjekte();
  </script>

</body>
</html>
