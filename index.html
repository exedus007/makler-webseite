<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Deisterblick Immobilien</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #0f4b3a;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 48px;
    }

    header p {
      margin: 0;
      font-size: 18px;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
    }

    .objekte-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .objekt-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .objekt-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.12);
    }

    .objekt-bild {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #ddd;
    }

    .objekt-inhalt {
      padding: 20px;
    }

    .objekt-card h3 {
      margin: 0 0 14px;
      color: #0f4b3a;
      font-size: 22px;
    }

    .objekt-card p {
      margin: 8px 0;
      font-size: 16px;
      color: #222;
    }

    .status-badge {
      display: inline-block;
      margin-top: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
    }

    .status-verfuegbar {
      background: #eef4f1;
      color: #0f4b3a;
    }

    .status-reserviert {
      background: #fff3cd;
      color: #8a6d00;
    }

    .leer-text {
      text-align: center;
      font-size: 18px;
      color: #555;
      padding: 40px 0;
    }

    /* POPUP */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .popup-overlay.active {
      display: flex;
    }

    .popup-box {
      position: relative;
      background: #ffffff;
      width: 100%;
      max-width: 980px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 22px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: stretch;
    }

    .popup-image-wrap {
      width: 42%;
      min-height: 100%;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup-image {
      width: 100%;
      height: 100%;
      max-height: 520px;
      object-fit: cover;
      display: block;
    }

    .popup-content {
      width: 58%;
      padding: 36px 34px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .popup-content h2 {
      margin: 0 0 18px;
      color: #0f4b3a;
      font-size: 34px;
      line-height: 1.2;
    }

    .popup-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 18px;
      margin-bottom: 20px;
    }

    .popup-meta p {
      margin: 0;
      font-size: 16px;
      line-height: 1.5;
    }

    .popup-beschreibung {
      margin-top: 8px;
      font-size: 16px;
      line-height: 1.7;
      color: #333;
    }

    .popup-status-row {
      margin-top: 22px;
    }

    .popup-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      z-index: 5;
    }

    .popup-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: rgba(15, 75, 58, 0.92);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      z-index: 5;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
    }

    .popup-prev {
      left: 14px;
    }

    .popup-next {
      right: 14px;
    }

    .popup-nav:hover,
    .popup-close:hover {
      opacity: 0.92;
    }

    @media (max-width: 900px) {
      h1 {
        font-size: 38px;
      }

      .popup-box {
        flex-direction: column;
        max-width: 680px;
      }

      .popup-image-wrap,
      .popup-content {
        width: 100%;
      }

      .popup-image {
        height: 260px;
        max-height: 260px;
      }

      .popup-content {
        padding: 24px;
      }

      .popup-content h2 {
        font-size: 28px;
      }

      .popup-meta {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      header {
        padding: 24px 16px;
      }

      h1 {
        font-size: 32px;
      }

      .container {
        padding: 14px;
      }

      .popup-overlay {
        padding: 10px;
      }

      .popup-image {
        height: 220px;
        max-height: 220px;
      }

      .popup-content h2 {
        font-size: 24px;
      }

      .popup-nav {
        width: 42px;
        height: 42px;
        font-size: 22px;
      }

      .popup-prev {
        left: 10px;
      }

      .popup-next {
        right: 10px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Deisterblick Immobilien</h1>
    <p>Aktuelle Objekte</p>
  </header>

  <div class="container">
    <div id="objekte-container">
      <p class="leer-text">Lade Objekte...</p>
    </div>
  </div>

  <!-- POPUP -->
  <div id="popupOverlay" class="popup-overlay">
    <div class="popup-box">
      <button class="popup-close" id="popupClose">&times;</button>
      <button class="popup-nav popup-prev" id="popupPrev">&#10094;</button>
      <button class="popup-nav popup-next" id="popupNext">&#10095;</button>
      <div id="popupInner"></div>
    </div>
  </div>

  <script>
    const projectId = "lya1es34";
    const dataset = "production";

    let objekteListe = [];
    let aktuellerIndex = 0;

    function bildUrlAusRef(ref) {
      if (!ref) return "";
      const parts = ref.split("-");
      const id = parts[1];
      const dimensions = parts[2];
      const format = parts[3];
      return `https://cdn.sanity.io/images/${projectId}/${dataset}/${id}-${dimensions}.${format}`;
    }

    function statusKlasse(status) {
      if (status === "reserviert") return "status-reserviert";
      return "status-verfuegbar";
    }

    function statusText(status) {
      if (status === "reserviert") return "Reserviert";
      if (status === "verkauft") return "Verkauft";
      return "Verfügbar";
    }

    function zeigePopup(index) {
      aktuellerIndex = index;
      const obj = objekteListe[index];
      const popupInner = document.getElementById("popupInner");
      const popupOverlay = document.getElementById("popupOverlay");

      let bildUrl = "";
      if (obj.bild && obj.bild.asset && obj.bild.asset._ref) {
        bildUrl = bildUrlAusRef(obj.bild.asset._ref);
      }

      popupInner.innerHTML = `
        <div class="popup-image-wrap">
          ${bildUrl ? `<img class="popup-image" src="${bildUrl}" alt="${obj.titel || ""}">` : ""}
        </div>
        <div class="popup-content">
          <h2>${obj.titel || ""}</h2>

          <div class="popup-meta">
            <p><strong>Ort:</strong> ${obj.ort || ""}</p>
            <p><strong>Preis:</strong> ${obj.preis || ""}</p>
            <p><strong>Wohnfläche:</strong> ${obj.wohnflaeche || ""}</p>
            <p><strong>Zimmer:</strong> ${obj.zimmer || ""}</p>
          </div>

          <div class="popup-beschreibung">
            ${obj.beschreibung || ""}
          </div>

          <div class="popup-status-row">
            <span class="status-badge ${statusKlasse(obj.status)}">${statusText(obj.status)}</span>
          </div>
        </div>
      `;

      popupOverlay.classList.add("active");
    }

    function naechstesObjekt() {
      if (objekteListe.length === 0) return;
      aktuellerIndex = (aktuellerIndex + 1) % objekteListe.length;
      zeigePopup(aktuellerIndex);
    }

    function vorherigesObjekt() {
      if (objekteListe.length === 0) return;
      aktuellerIndex = (aktuellerIndex - 1 + objekteListe.length) % objekteListe.length;
      zeigePopup(aktuellerIndex);
    }

    function popupSchliessen() {
      document.getElementById("popupOverlay").classList.remove("active");
    }

    async function ladeObjekte() {
      const query = encodeURIComponent('*[_type=="immobilie"]');
      const url = `https://${projectId}.api.sanity.io/v2023-01-01/data/query/${dataset}?query=${query}`;

      const container = document.getElementById("objekte-container");

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (!container) return;

        objekteListe = (data.result || []).filter(obj => obj.status !== "verkauft");

        if (objekteListe.length === 0) {
          container.innerHTML = '<p class="leer-text">Keine verfügbaren oder reservierten Objekte vorhanden.</p>';
          return;
        }

        container.innerHTML = '<div class="objekte-grid"></div>';
        const grid = container.querySelector(".objekte-grid");

        objekteListe.forEach((obj, index) => {
          const div = document.createElement("div");
          div.classList.add("objekt-card");

          let bildUrl = "";
          if (obj.bild && obj.bild.asset && obj.bild.asset._ref) {
            bildUrl = bildUrlAusRef(obj.bild.asset._ref);
          }

          div.innerHTML = `
            ${bildUrl ? `<img class="objekt-bild" src="${bildUrl}" alt="${obj.titel || ""}">` : ""}
            <div class="objekt-inhalt">
              <h3>${obj.titel || ""}</h3>
              <p><strong>Ort:</strong> ${obj.ort || ""}</p>
              <p><strong>Preis:</strong> ${obj.preis || ""}</p>
              <p><strong>Wohnfläche:</strong> ${obj.wohnflaeche || ""}</p>
              <p><strong>Zimmer:</strong> ${obj.zimmer || ""}</p>
              <span class="status-badge ${statusKlasse(obj.status)}">${statusText(obj.status)}</span>
            </div>
          `;

          div.addEventListener("click", () => {
            zeigePopup(index);
          });

          grid.appendChild(div);
        });

      } catch (error) {
        console.error("Fehler:", error);
        if (container) {
          container.innerHTML = '<p class="leer-text">Fehler beim Laden</p>';
        }
      }
    }

    document.getElementById("popupClose").addEventListener("click", popupSchliessen);
    document.getElementById("popupNext").addEventListener("click", naechstesObjekt);
    document.getElementById("popupPrev").addEventListener("click", vorherigesObjekt);

    document.getElementById("popupOverlay").addEventListener("click", function(e) {
      if (e.target === this) {
        popupSchliessen();
      }
    });

    document.addEventListener("keydown", function(e) {
      const popupOffen = document.getElementById("popupOverlay").classList.contains("active");
      if (!popupOffen) return;

      if (e.key === "Escape") popupSchliessen();
      if (e.key === "ArrowRight") naechstesObjekt();
      if (e.key === "ArrowLeft") vorherigesObjekt();
    });

    ladeObjekte();
  </script>

</body>
</html>
