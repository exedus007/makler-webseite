<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Deisterblick Immobilien</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #0f3d2e;
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }

    .objekt-card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .objekt-card h3 {
      margin-top: 0;
      color: #0f3d2e;
    }
  </style>
</head>

<body>

<header>
  <h1>Deisterblick Immobilien</h1>
  <p>Aktuelle Objekte</p>
</header>

<div class="container">
  <div id="objekte-container">
    <p>Lade Objekte...</p>
  </div>
</div>

<script>
async function ladeObjekte() {
  const projectId = "lya1es34";
  const dataset = "production";

  const url = `https://${projectId}.api.sanity.io/v2023-01-01/data/query/${dataset}?query=*[_type=="immobilie"]`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    const container = document.getElementById("objekte-container");
    container.innerHTML = "";

    data.result.forEach(obj => {
      const div = document.createElement("div");
      div.classList.add("objekt-card");

      div.innerHTML = `
        <h3>${obj.titel}</h3>
        <p><strong>Ort:</strong> ${obj.ort}</p>
        <p><strong>Preis:</strong> ${obj.preis}</p>
        <p><strong>Wohnfläche:</strong> ${obj.wohnflaeche}</p>
        <p><strong>Zimmer:</strong> ${obj.zimmer}</p>
        <p><strong>Status:</strong> ${obj.status}</p>
      `;

      container.appendChild(div);
    });

  } catch (error) {
    console.error("Fehler:", error);
    document.getElementById("objekte-container").innerHTML = "Fehler beim Laden";
  }
}

ladeObjekte();
</script>

</body>
</html>
