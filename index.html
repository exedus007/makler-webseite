```html
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Makler Webseite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .kontakt {
      padding: 40px;
      background: #f5f5f5;
      max-width: 600px;
      margin: auto;
    }

    .kontakt h2 {
      margin-bottom: 20px;
    }

    .kontakt input,
    .kontakt textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .kontakt button {
      background: #007BFF;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .kontakt button:hover {
      background: #0056b3;
    }

    /* DATENSCHUTZ FIX */
    .datenschutz {
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .checkbox-container {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      cursor: pointer;
      line-height: 1.4;
    }

    .checkbox-container input {
      margin-top: 3px;
      cursor: pointer;
    }

    .checkbox-container a {
      color: #007BFF;
      text-decoration: none;
    }

    .checkbox-container a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

  <section class="kontakt">
    <h2>Kontakt</h2>

    <form>
      <input type="text" placeholder="Name" required>
      <input type="email" placeholder="E-Mail" required>
      <textarea placeholder="Nachricht" required></textarea>

      <div class="datenschutz">
        <label class="checkbox-container">
          <input type="checkbox" required>
          <span>
            Ich habe die <a href="#">Datenschutzerklärung</a> gelesen und akzeptiere sie.
          </span>
        </label>
      </div>

      <button type="submit">Absenden</button>
    </form>
  </section>

</body>
</html>
